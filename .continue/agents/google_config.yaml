name: Gemini Multi-Project Config
version: 1.1.0
schema: v1

rules:
  - "Language: Respond in Croatian (ijekavica) or English. No Serbian/Ekavica."
  - "Comments: All code comments must be in ENGLISH."
  - "File Header: Mandatory! Always put the relative file path as a comment in the very first line."

systemMessage: |
  Global development assistant configuration.

  HARD RULES:
  - Always include the relative file path in the first comment line.
  - All code comments must be written in English.
  - Prefer safe and maintainable code.

  SPACE ENGINEERS SAFETY:
  - Respect Space Engineers scripting limitations.
  - Torch plugins must ensure thread safety using MySandboxGame.Static.Invoke when touching game world objects.

contextProviders:

  # Project code
  - name: codebase
    params:
      useReranking: true
      nRetrieve: 20
      nFinal: 5

  # Documentation context
  - name: docs
    params:
      maxChunks: 15

  # Folder context
  - name: folder

  # Diff context (useful when editing files)
  - name: diff

models:
  # 1. SPACE ENGINEERS: IN-GAME SCRIPTS
  - name: "SE: In-Game Script (Gemini 1.5 Flash)"
    provider: google
    model: gemini-1.5-flash
    apiKey: ${GOOGLE_API_KEY}
    systemMessage: |
      Context: Space Engineers (SE) In-Game Scripting (Programmable Block).
      STRICT RULES:
      - Use C# 6.0 and .NET Framework 4.6.
      - API: VRage.Game, VRageMath, Sandbox.ModAPI.Ingame.
      - Constraints: NO LINQ, NO Reflection, NO file access, NO multithreading.
      - Style: Use string.Format() instead of interpolation ($).

  # 2. SPACE ENGINEERS: TORCH PLUGIN
  - name: "SE: Torch Plugin (Gemini 1.5 Pro)"
    provider: google
    model: gemini-1.5-pro
    apiKey: ${GOOGLE_API_KEY}
    systemMessage: |
      Context: Space Engineers Torch Server Plugin development (v1.3.1.328).
      STRICT RULES:
      - Target: .NET Framework 4.8.
      - API: Torch.API, VRage.Game, Sandbox.ModAPI (Full API).
      - Safety: Ensure thread safety (MySandboxGame.Static.Invoke) for game world interaction.

  # 3. SPACE ENGINEERS: WORLD MODS
  - name: "SE: World Mod (Gemini 1.5 Pro)"
    provider: google
    model: gemini-1.5-pro
    apiKey: ${GOOGLE_API_KEY}
    systemMessage: |
      Context: Space Engineers World Mod development (Client/Server side).
      STRICT RULES:
      - Target: C# 6.0 / .NET Framework 4.8.
      - API: Sandbox.ModAPI, VRage.Game.ModAPI.
      - Constraints: Whitelisted API only. NO File I/O.

  # 4. PULSAR PLUGIN
  - name: "Pulsar Plugin (Gemini 1.5 Pro)"
    provider: google
    model: gemini-1.5-pro
    apiKey: ${GOOGLE_API_KEY}
    systemMessage: |
      Context: Pulsar Plugin Development.
      STRICT RULES:
      - Target: .NET Framework 4.8.
      - Ensure compatibility with Pulsar API hooks.

  # 5. UNITY EXPERT
  - name: "Unity Expert (Gemini 1.5 Pro)"
    provider: google
    model: gemini-1.5-pro
    apiKey: ${GOOGLE_API_KEY}
    systemMessage: |
      Context: Unity Engine (C# 9.0+ / .NET Standard 2.1).
      STRICT RULES:
      - API: UnityEngine, UnityEditor.
      - Optimization: Cache references, use TryGetComponent.
      - Style: camelCase for private fields with '_' (e.g., _speed).

  # 6. LARAVEL & PHP
  - name: "Laravel 11 / PHP 8.3 (Gemini 1.5 Pro)"
    provider: google
    model: gemini-1.5-pro
    apiKey: ${GOOGLE_API_KEY}
    systemMessage: |
      Context: PHP 8.3 / Laravel 11.
      STRICT RULES:
      - Use modern PHP features (Readonly, Enums, Union types).
      - Style: PSR-12 coding standard.

tabAutocompleteModel:
  name: Gemini Autocomplete (Flash)
  provider: google
  model: gemini-1.5-flash
  apiKey: ${GOOGLE_API_KEY}
  options:
    temperature: 0.1
    maxTokens: 512

tabAutocompleteOptions:
  debounceDelay: 500
  maxPromptTokens: 2048